<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>診斷證明書助手 - 格式規範版</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; padding: 20px; background-color: #f4f7f6; line-height: 1.6; }
        .container { max-width: 1300px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .tooth-chart { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; background: #f8f9fa; padding: 20px; border: 2px solid #dee2e6; }
        .quadrant { display: grid; grid-template-columns: repeat(8, 1fr); gap: 5px; }
        .tooth-btn { padding: 12px 0; font-size: 13px; cursor: pointer; border: 1px solid #ced4da; background: white; text-align: center; border-radius: 4px; }
        .tooth-btn.active { background: #007bff; color: white; border-color: #0056b3; }
        .input-group { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 20px; padding: 15px; border-radius: 8px; background: #f1f3f5; align-items: flex-end; }
        .input-item { display: flex; flex-direction: column; }
        label { font-weight: bold; font-size: 13px; margin-bottom: 5px; color: #495057; }
        select, input { padding: 8px; border: 1px solid #ced4da; border-radius: 6px; font-size: 14px; }
        .add-btn { padding: 10px 30px; background: #28a745; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .reset-btn { padding: 8px 15px; background: #6c757d; color: white; border: none; border-radius: 6px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 25px; }
        th { background: #f8f9fa; padding: 10px; text-align: left; border-bottom: 2px solid #dee2e6; font-size: 14px; }
        td { padding: 8px; border-bottom: 1px solid #eee; }
        .inline-select { width: 100%; padding: 5px; border: 1px solid #ddd; border-radius: 4px; background: #fffde7; }
        .output-area { background: #fff; padding: 25px; border: 2px solid #007bff; border-radius: 8px; font-size: 17px; min-height: 120px; white-space: pre-wrap; margin-top: 20px; }
        .copy-btn { margin-top: 15px; padding: 12px 40px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .del-btn { background: #f8d7da; border: none; padding: 5px 10px; border-radius: 4px; color: #721c24; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-flex">
        <h2>🏥 診斷證明書產生器 (標準格式)</h2>
        <button class="reset-btn" onclick="resetAll()">🧹 清除全部資料</button>
    </div>

    <div class="tooth-chart">
        <div class="quadrant" id="Q1"></div><div class="quadrant" id="Q2"></div>
        <div class="quadrant" id="Q4"></div><div class="quadrant" id="Q3"></div>
    </div>

    <div class="input-group">
        <div class="input-item"><label>牙位</label><input type="text" id="dispFDI" readonly><input type="hidden" id="fdiValue"></div>
        <div class="input-item"><label>手術日期</label><input type="date" id="opDate"></div>
        <div class="input-item"><label>診斷</label>
            <select id="diag">
                <option value="阻生">阻生</option><option value="水平阻生">水平阻生</option>
                <option value="異位萌發">異位萌發</option><option value="嚴重齲齒">嚴重齲齒</option>
                <option value="嚴重牙周病">嚴重牙周病</option><option value="殘根">殘根</option>
            </select>
        </div>
        <div class="input-item"><label>手術方式</label>
            <select id="opType">
                <option value="簡單拔牙">簡單拔牙</option><option value="複雜拔牙">複雜拔牙</option>
                <option value="單純齒切除術">單純齒切除術</option><option value="複雜齒切除術">複雜齒切除術</option>
                <option value="手術拔除深度阻生齒">手術拔除深度阻生齒</option>
            </select>
        </div>
        <div class="input-item"><label>材料</label>
            <select id="material">
                <option value="">無</option>
                <option value="，術後置入膠原蛋白">膠原蛋白</option>
                <option value="，術後置入再生膜及骨粉">再生膜及骨粉</option>
                <option value="，術後置入牙釉基質蛋白及骨粉">牙釉基質蛋白及骨粉</option>
            </select>
        </div>
        <button class="add-btn" onclick="addRecord()">＋加入紀錄</button>
    </div>

    <table id="recordTable">
        <thead>
            <tr>
                <th width="10%">日期</th><th width="8%">牙位</th><th width="18%">診斷</th>
                <th width="22%">手術名稱</th><th width="18%">置入材料</th>
                <th width="14%">拆線日期</th><th width="8%">操作</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <div class="output-area" id="finalOutput">尚未輸入資料...</div>
    <button class="copy-btn" onclick="copyText()">複製全文內容</button>
</div>

<script>
    let records = [];
    const toothMap = {
        18:["右上","第三大臼齒"], 17:["右上","第二大臼齒"], 16:["右上","第一大臼齒"], 15:["右上","第二小臼齒"], 14:["右上","第一小臼齒"], 13:["右上","犬齒"], 12:["右上","側門齒"], 11:["右上","正中門齒"],
        21:["左上","正中門齒"], 22:["左上","側門齒"], 23:["左上","犬齒"], 24:["左上","第一小臼齒"], 25:["左上","第二小臼齒"], 26:["左上","第一大臼齒"], 27:["左上","第二大臼齒"], 28:["左上","第三大臼齒"],
        31:["左下","正中門齒"], 32:["左下","側門齒"], 33:["左下","犬齒"], 34:["左下","第一小臼齒"], 35:["左下","第二小臼齒"], 36:["左下","第一大臼齒"], 37:["左下","第二大臼齒"], 38:["左下","第三大臼齒"],
        48:["右下","第三大臼齒"], 47:["右下","第二大臼齒"], 46:["右下","第一大臼齒"], 45:["右下","第二小臼齒"], 44:["右下","第一小臼齒"], 43:["右下","犬齒"], 42:["右下","側門齒"], 41:["右下","正中門齒"]
    };
    const sortOrder = [18,17,16,15,14,13,12,11, 21,22,23,24,25,26,27,28, 31,32,33,34,35,36,37,38, 41,42,43,44,45,46,47,48];

    function init() {
        const qs = { Q1:[18,17,16,15,14,13,12,11], Q2:[21,22,23,24,25,26,27,28], Q4:[48,47,46,45,44,43,42,41], Q3:[31,32,33,34,35,36,37,38] };
        for (let q in qs) {
            const container = document.getElementById(q);
            qs[q].forEach(fdi => {
                const b = document.createElement('button'); b.className = 'tooth-btn'; b.innerText = fdi;
                b.onclick = () => {
                    document.querySelectorAll('.tooth-btn').forEach(x => x.classList.remove('active'));
                    b.classList.add('active');
                    document.getElementById('dispFDI').value = toothMap[fdi][0] + toothMap[fdi][1];
                    document.getElementById('fdiValue').value = fdi;
                };
                container.appendChild(b);
            });
        }
    }

    function formatTeethNames(fdiList) {
        if (fdiList.length === 0) return "";
        fdiList.sort((a, b) => sortOrder.indexOf(a) - sortOrder.indexOf(b));
        let result = "", currentQuad = "";
        fdiList.forEach((fdi, index) => {
            const [quad, name] = toothMap[fdi];
            if (quad !== currentQuad) {
                if (index > 0) result += (index === fdiList.length - 1) ? "及" : "、";
                result += quad + name; currentQuad = quad;
            } else {
                result += (index === fdiList.length - 1) ? "及" : "、";
                result += name;
            }
        });
        return result;
    }

    function addRecord() {
        const fdi = parseInt(document.getElementById('fdiValue').value);
        const date = document.getElementById('opDate').value, diag = document.getElementById('diag').value;
        const opName = document.getElementById('opType').value, mat = document.getElementById('material').value;
        if (!fdi || !date) return alert("請選牙位與日期");
        records.push({ fdi, date, diag, opName, mat, stitch: "" });
        render();
    }

    function updateRecord(index, field, value) {
        records[index][field] = value;
        render();
    }

    function render() {
        const tbody = document.querySelector('#recordTable tbody');
        tbody.innerHTML = records.map((r, i) => `
            <tr>
                <td>${r.date}</td><td><b>${r.fdi}</b></td>
                <td><select class="inline-select" onchange="updateRecord(${i}, 'diag', this.value)">
                    <option value="阻生" ${r.diag==='阻生'?'selected':''}>阻生</option>
                    <option value="水平阻生" ${r.diag==='水平阻生'?'selected':''}>水平阻生</option>
                    <option value="異位萌發" ${r.diag==='異位萌發'?'selected':''}>異位萌發</option>
                    <option value="嚴重齲齒" ${r.diag==='嚴重齲齒'?'selected':''}>嚴重齲齒</option>
                    <option value="嚴重牙周病" ${r.diag==='嚴重牙周病'?'selected':''}>嚴重牙周病</option>
                    <option value="殘根" ${r.diag==='殘根'?'selected':''}>殘根</option>
                </select></td>
                <td><select class="inline-select" onchange="updateRecord(${i}, 'opName', this.value)">
                    <option value="簡單拔牙" ${r.opName==='簡單拔牙'?'selected':''}>簡單拔牙</option>
                    <option value="複雜拔牙" ${r.opName==='複雜拔牙'?'selected':''}>複雜拔牙</option>
                    <option value="單純齒切除術" ${r.opName==='單純齒切除術'?'selected':''}>單純齒切除術</option>
                    <option value="複雜齒切除術" ${r.opName==='複雜齒切除術'?'selected':''}>複雜齒切除術</option>
                    <option value="手術拔除深度阻生齒" ${r.opName==='手術拔除深度阻生齒'?'selected':''}>手術拔除深度阻生齒</option>
                </select></td>
                <td><select class="inline-select" onchange="updateRecord(${i}, 'mat', this.value)">
                    <option value="" ${r.mat===''?'selected':''}>無</option>
                    <option value="，術後置入膠原蛋白" ${r.mat.includes('膠原蛋白')?'selected':''}>膠原蛋白</option>
                    <option value="，術後置入再生膜及骨粉" ${r.mat.includes('再生膜')?'selected':''}>再生膜及骨粉</option>
                    <option value="，術後置入牙釉基質蛋白及骨粉" ${r.mat.includes('牙釉基質')?'selected':''}>牙釉基質蛋白及骨粉</option>
                </select></td>
                <td><input type="date" value="${r.stitch}" onchange="updateRecord(${i}, 'stitch', this.value)" style="width:125px; font-size:12px"></td>
                <td><button class="del-btn" onclick="records.splice(${i},1);render()">刪除</button></td>
            </tr>
        `).join('');
        
        if (records.length === 0) { document.getElementById('finalOutput').innerText = "尚未輸入資料..."; return; }

        const diagGroup = {};
        records.forEach(r => {
            if (!diagGroup[r.diag]) diagGroup[r.diag] = [];
            if (!diagGroup[r.diag].includes(r.fdi)) diagGroup[r.diag].push(r.fdi);
        });
        
        // 加入（以下空白）
        let diagLine = "診斷：" + Object.keys(diagGroup).map(d => ${formatTeethNames(diagGroup[d])}${d}).join('，') + "（以下空白）";

        let contentText = "內容：患者因上述病因至本院求診。";
        const dateGroup = {};
        records.forEach(r => { if(!dateGroup[r.date]) dateGroup[r.date] = []; dateGroup[r.date].push(r); });

        Object.keys(dateGroup).sort().forEach(date => {
            const items = dateGroup[date];
            const d = new Date(date);
            const dateStr = 於民國 ${d.getFullYear()-1911} 年 ${d.getMonth()+1} 月 ${d.getDate()} 日;
            
            const stitchGroups = {};
            items.forEach(item => {
                const sKey = item.stitch || "no_stitch";
                if(!stitchGroups[sKey]) stitchGroups[sKey] = [];
                stitchGroups[sKey].push(item);
            });

            Object.keys(stitchGroups).forEach(sKey => {
                const groupItems = stitchGroups[sKey];
                const hasSurgery = groupItems.some(gi => gi.opName.includes("切除術") || gi.opName.includes("阻生齒"));
                const action = hasSurgery ? "局部麻醉下切開翻瓣進行" : "局部麻醉下進行";
                const ops = Array.from(new Set(groupItems.map(gi => gi.opName))).join('及');
                const teeth = formatTeethNames(groupItems.map(gi => gi.fdi));
                
                let matAndSuture = groupItems[0].mat;
                if (sKey !== "no_stitch") {
                    if (matAndSuture) { matAndSuture += "並縫合"; } 
                    else { matAndSuture = "並縫合"; }
                }

                contentText += ${dateStr}${action}${teeth}之${ops}${matAndSuture};
                
                if (sKey !== "no_stitch") {
                    const sd = new Date(sKey);
                    contentText += ，於民國 ${sd.getFullYear()-1911} 年 ${sd.getMonth()+1} 月 ${sd.getDate()} 日回診拆線。;
                } else {
                    contentText += "。";
                }
            });
        });

        // 加入（以下空白）
        contentText += "囑患者術後宜適當休息，避免劇烈運動，並注意口腔衛生預防感染，需定期回診追蹤檢查。（以下空白）";
        document.getElementById('finalOutput').innerText = diagLine + "\n\n" + contentText;
    }
    function resetAll() { if (confirm("確定清除所有紀錄？")) { records = []; render(); } }
    function copyText() { navigator.clipboard.writeText(document.getElementById('finalOutput').innerText); alert("診斷內容已複製！"); }
    window.onload = init;
</script>
</body>
</html>
